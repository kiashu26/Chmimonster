<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>케미몬스터 다이얼</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#101018;
    --bg-1:#1a1a26;
    --panel:#1f2030;
    --panel-2:#252739;
    --line:#33344a;
    --text-0:#f4f2ec;
    --text-1:#a9a7bc;
    --text-2:#6f6d85;
    --gold:#e8c468;
    --gold-dim:#8a7645;
    --danger:#ff5c5c;
    --def-blue:#3fa3ea;
    --mp-purple:#a870e8;

    --c1:#ff6a3d;  /* 불 */
    --c1-glow:#ff8a5c;
    --c2:#79c94a;  /* 풀 */
    --c2-glow:#98e06b;
    --c3:#3fa3ea;  /* 물 */
    --c3-glow:#63bbf5;
    --c4:#a870e8;  /* 어둠 */
    --c4-glow:#c397f2;

    --accent: var(--c1);
    --accent-glow: var(--c1-glow);
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none;}
  html,body{height:100%;}
  /* ---------- background character art ---------- */
  .bg-layer{
    position:fixed; inset:0;
    z-index:0;
    overflow:hidden;
    pointer-events:none;
  }
  .bg-photo{
    position:absolute; inset:0;
    background-size:contain;
    background-repeat:no-repeat;
    background-position:center 46%;
    opacity:0;
    transition:opacity .6s ease;
    filter:saturate(.9) brightness(1.15);
  }
  .bg-photo.active{ opacity:1; }
  .bg-overlay{
    position:absolute; inset:0;
    background:
      radial-gradient(circle at 50% 35%, rgba(16,16,24,.20), rgba(16,16,24,.68) 72%),
      linear-gradient(180deg, rgba(16,16,24,.38) 0%, rgba(16,16,24,.70) 55%, rgba(16,16,24,.85) 100%);
  }
  .stage{ position:relative; z-index:1; }

  body{
    margin:0;
    background:
      radial-gradient(circle at 15% 10%, rgba(255,255,255,0.05), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(255,255,255,0.04), transparent 45%),
      var(--bg-0);
    color:var(--text-0);
    font-family:'Noto Sans KR', system-ui, sans-serif;
    overscroll-behavior:none;
    touch-action:manipulation;
  }

  .stage{
    display:flex;
    flex-direction:column;
    min-height:100vh;
    min-height:100dvh;
    padding:10px 16px 14px;
    gap:8px;
  }

  /* ---------- top bar ---------- */
  .topbar{
    display:flex;
    align-items:center;
    gap:14px;
  }
  .roster{
    display:flex;
    gap:8px;
  }
  .chip{
    width:44px;height:44px;
    border-radius:14px;
    border:2px solid var(--line);
    background:var(--panel);
    display:flex;align-items:center;justify-content:center;
    font-size:20px;
    cursor:pointer;
    position:relative;
    transition:transform .15s ease, border-color .15s ease, box-shadow .15s ease;
  }
  .chip::after{
    content:'';
    position:absolute; inset:-2px;
    border-radius:16px;
    border:2px solid transparent;
    transition:border-color .15s ease;
  }
  .chip[data-active="true"]{
    transform:translateY(-2px);
    border-color:var(--chip-color);
    box-shadow:0 0 0 3px color-mix(in srgb, var(--chip-color) 25%, transparent), 0 6px 14px -4px color-mix(in srgb, var(--chip-color) 60%, transparent);
  }
  .chip[data-hp-zero="true"]{ opacity:.45; filter:grayscale(.6); }

  .title-block{
    display:flex;
    flex-direction:column;
    line-height:1.1;
    margin-right:auto;
  }
  .title-block .name{
    font-family:'Jua', sans-serif;
    font-size:20px;
    color:var(--text-0);
    letter-spacing:.3px;
  }
  .title-block .elem{
    font-size:11px;
    color:var(--accent-glow);
    font-weight:700;
    letter-spacing:.5px;
    display:flex; align-items:center; gap:4px;
  }
  .elem .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);}

  .reset-btn{
    border:1px solid var(--line);
    background:var(--panel);
    color:var(--text-1);
    font-family:'Noto Sans KR',sans-serif;
    font-size:12px;
    font-weight:500;
    padding:9px 14px;
    border-radius:12px;
    cursor:pointer;
    transition:background .15s, color .15s, border-color .15s;
  }
  .reset-btn:active{background:var(--panel-2); color:var(--text-0);}

  /* ---------- dial row ---------- */
  .dials{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:clamp(10px, 3vw, 34px);
    padding:2px 0 0;
  }

  .gauge{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    width:min(30vw, 210px);
  }

  .dial-wrap{
    position:relative;
    width:100%;
    aspect-ratio:1/1;
    max-width:210px;
    touch-action:none;
  }
  .dial-wrap svg{ width:100%; height:100%; display:block; overflow:visible; }

  .track{ fill:none; stroke:var(--panel-2); stroke-width:14; stroke-linecap:round; }
  .progress{ fill:none; stroke-width:14; stroke-linecap:round; filter:drop-shadow(0 0 6px var(--g-color)); transition:stroke .2s; }
  .tick{ stroke:var(--line); stroke-width:2; }
  .tick.filled{ stroke:var(--g-color); opacity:.9; }

  .knob{
    cursor:grab;
    filter:drop-shadow(0 2px 5px rgba(0,0,0,.5));
  }
  .knob circle.knob-ring{ fill:var(--bg-1); stroke:var(--g-color); stroke-width:5; }
  .knob:active{ cursor:grabbing; }

  .dial-center{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    pointer-events:none;
  }
  .dial-value{
    font-family:'Jua', sans-serif;
    font-size:clamp(26px, 8vw, 42px);
    color:var(--text-0);
    line-height:1;
  }
  .dial-max{
    font-size:11px;
    color:var(--text-2);
    margin-top:2px;
    font-weight:500;
  }
  .dial-zero .dial-value{ color:var(--danger); }

  .gauge-label{
    font-size:12px;
    font-weight:700;
    letter-spacing:1px;
    color:var(--text-1);
  }

  .stepper{
    display:flex;
    align-items:center;
    gap:16px;
  }
  .step-btn{
    width:46px;height:46px;
    border-radius:13px;
    border:1px solid var(--line);
    background:var(--panel);
    color:var(--text-0);
    font-size:22px;
    font-weight:700;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    line-height:0;
    flex-shrink:0;
  }
  .step-btn:active{ background:var(--g-color); border-color:var(--g-color); color:#161620; }
  .step-btn:disabled{ opacity:.3; }

  /* per-gauge color vars */
  .gauge[data-stat="hp"]{ --g-color: var(--danger); }
  .gauge[data-stat="def"]{ --g-color: var(--def-blue); }
  .gauge[data-stat="mp"]{ --g-color: var(--mp-purple); }

  /* portrait notice */
  .rotate-hint{
    position:fixed; left:12px; right:12px; bottom:12px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:10px 14px;
    display:none;
    align-items:center;
    gap:10px;
    font-size:12.5px;
    color:var(--text-1);
    z-index:20;
    box-shadow:0 10px 24px rgba(0,0,0,.35);
  }
  .rotate-hint button{
    margin-left:auto;
    background:none;border:none;color:var(--text-2);font-size:16px;cursor:pointer;padding:4px;
  }
  @media (orientation:portrait){
    .rotate-hint{ display:flex; }
  }
  @media (max-height:420px){
    .stage{ padding:8px 14px 10px; gap:6px; }
    .chip{ width:38px; height:38px; font-size:17px; }
  }
</style>
</head>

<div class="stage">
  <div class="topbar">
    <div class="roster" id="roster"></div>
    <div class="title-block">
      <div class="name" id="charName">캐릭터 1</div>
      <div class="elem" id="charElem"><span class="dot"></span>FIRE</div>
    </div>
    <button class="reset-btn" id="resetBtn">전체 초기화</button>
  </div>

</div>

  📱 기기를 가로로 돌리면 더 편하게 플레이할 수 있어요
  <button id="rotateClose" aria-label="닫기">✕</button>
</div>

<script>
(function(){
  "use strict";

  /* ---------------- character data ---------------- */
  const CHARACTERS = [
    { id:1, name:'캐릭터 1', elem:'FIRE',  icon:'🔥', color:'--c1', glow:'--c1-glow' },
    { id:2, name:'캐릭터 2', elem:'GRASS', icon:'🌿', color:'--c2', glow:'--c2-glow' },
    { id:3, name:'캐릭터 3', elem:'WATER', icon:'💧', color:'--c3', glow:'--c3-glow' },
    { id:4, name:'캐릭터 4', elem:'DARK',  icon:'🌙', color:'--c4', glow:'--c4-glow' },
  ];

  const STATS = [
    { key:'hp',  label:'체력', max:12 },
    { key:'def', label:'방어', max:4  },
    { key:'mp',  label:'마나', max:12 },
  ];

  const START_ANGLE = -130;
  const END_ANGLE   = 130;
  const SWEEP       = END_ANGLE - START_ANGLE;
  const CX = 100, CY = 100, R = 78, TICK_OUT = 92, TICK_IN = 84;

  const STORAGE_KEY = 'chemi-monster-dial-state-v2';

  /* ---------------- state ---------------- */
  function defaultState(){
    const s = {};
    CHARACTERS.forEach(c=>{
      s[c.id] = { hp: 5, def: 0, mp: 3 };
    });
    return s;
  }

  let state = loadState();
  let activeId = CHARACTERS[0].id;

  function loadState(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return defaultState();
      const parsed = JSON.parse(raw);
      const base = defaultState();
      CHARACTERS.forEach(c=>{
        if(parsed[c.id]){
          base[c.id].hp  = clamp(parsed[c.id].hp, 0, 12);
          base[c.id].def = clamp(parsed[c.id].def, 0, 4);
          base[c.id].mp  = clamp(parsed[c.id].mp, 0, 12);
        }
      });
      return base;
    }catch(e){ return defaultState(); }
  }

  function saveState(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
  }

  function clamp(v, lo, hi){ return Math.max(lo, Math.min(hi, v)); }

  /* ---------------- geometry helpers ---------------- */
  function polar(cx, cy, r, angleDeg){
    const rad = angleDeg * Math.PI / 180;
    return { x: cx + r*Math.sin(rad), y: cy - r*Math.cos(rad) };
  }
  function arcPath(cx, cy, r, a0, a1){
    const p0 = polar(cx,cy,r,a0);
    const p1 = polar(cx,cy,r,a1);
    const large = Math.abs(a1-a0) > 180 ? 1 : 0;
    return `M ${p0.x.toFixed(2)} ${p0.y.toFixed(2)} A ${r} ${r} 0 ${large} 1 ${p1.x.toFixed(2)} ${p1.y.toFixed(2)}`;
  }
  function valueToAngle(v, max){ return START_ANGLE + (v/max) * SWEEP; }
  function angleToValue(a, max){
    const t = clamp((a - START_ANGLE) / SWEEP, 0, 1);
    return Math.round(t * max);
  }

  /* ---------------- build roster chips ---------------- */
  const rosterEl = document.getElementById('roster');
  CHARACTERS.forEach(c=>{
    const btn = document.createElement('div');
    btn.className = 'chip';
    btn.style.setProperty('--chip-color', `var(${c.color})`);
    btn.textContent = c.icon;
    btn.dataset.id = c.id;
    btn.addEventListener('click', ()=> selectCharacter(c.id));
    rosterEl.appendChild(btn);
  });

  /* ---------------- build gauges ---------------- */
  const dialsEl = document.getElementById('dials');
  const gaugeRefs = {};

  STATS.forEach(stat=>{
    const wrap = document.createElement('div');
    wrap.className = 'gauge';
    wrap.dataset.stat = stat.key;

    wrap.innerHTML = `
      <div class="dial-wrap" data-key="${stat.key}">
        <svg viewBox="0 0 200 200">
          <path class="track" d="${arcPath(CX,CY,R,START_ANGLE,END_ANGLE)}"></path>
          <g class="ticks"></g>
          <path class="progress" d=""></path>
          <g class="knob" tabindex="0" role="slider"
             aria-valuemin="0" aria-valuemax="${stat.max}"
             aria-label="${stat.label} 다이얼">
            <circle class="knob-ring" r="11"></circle>
          </g>
        </svg>
        <div class="dial-center">
          <div class="dial-value">0</div>
          <div class="dial-max">/ ${stat.max}</div>
        </div>
      </div>
      <div class="gauge-label">${stat.label}</div>
      <div class="stepper">
        <button class="step-btn" data-dir="-1" aria-label="${stat.label} 감소">−</button>
        <button class="step-btn" data-dir="1" aria-label="${stat.label} 증가">+</button>
      </div>
    `;
    dialsEl.appendChild(wrap);

    const svg = wrap.querySelector('svg');
    const ticksG = wrap.querySelector('.ticks');
    for(let i=0;i<=stat.max;i++){
      const a = valueToAngle(i, stat.max);
      const p0 = polar(CX,CY,TICK_IN,a);
      const p1 = polar(CX,CY,TICK_OUT,a);
      const line = document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1', p0.x); line.setAttribute('y1', p0.y);
      line.setAttribute('x2', p1.x); line.setAttribute('y2', p1.y);
      line.classList.add('tick');
      line.dataset.step = i;
      ticksG.appendChild(line);
    }

    gaugeRefs[stat.key] = {
      wrap, svg,
      dialWrap: wrap.querySelector('.dial-wrap'),
      progress: wrap.querySelector('.progress'),
      knob: wrap.querySelector('.knob'),
      valueEl: wrap.querySelector('.dial-value'),
      centerEl: wrap.querySelector('.dial-center'),
      ticks: [...ticksG.querySelectorAll('.tick')],
      max: stat.max
    };

    // stepper buttons
    wrap.querySelectorAll('.step-btn').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const dir = parseInt(btn.dataset.dir,10);
        setValue(stat.key, state[activeId][stat.key] + dir);
      });
    });

    // drag interaction
    setupDrag(wrap.querySelector('.dial-wrap'), stat.key, stat.max);

    // keyboard
    gaugeRefs[stat.key].knob.addEventListener('keydown', (e)=>{
      if(e.key === 'ArrowRight' || e.key === 'ArrowUp'){ e.preventDefault(); setValue(stat.key, state[activeId][stat.key]+1); }
      if(e.key === 'ArrowLeft' || e.key === 'ArrowDown'){ e.preventDefault(); setValue(stat.key, state[activeId][stat.key]-1); }
    });
  });

  function setupDrag(dialWrap, key, max){
    let dragging = false;

    function angleFromEvent(clientX, clientY){
      const rect = dialWrap.getBoundingClientRect();
      const cx = rect.left + rect.width/2;
      const cy = rect.top + rect.height/2;
      const dx = clientX - cx;
      const dy = clientY - cy;
      let a = Math.atan2(dx, -dy) * 180 / Math.PI;
      a = clamp(a, START_ANGLE, END_ANGLE);
      return a;
    }

    function onMove(clientX, clientY){
      const a = angleFromEvent(clientX, clientY);
      const v = angleToValue(a, max);
      setValue(key, v, true);
    }

    dialWrap.addEventListener('pointerdown', (e)=>{
      dragging = true;
      dialWrap.setPointerCapture(e.pointerId);
      onMove(e.clientX, e.clientY);
    });
    dialWrap.addEventListener('pointermove', (e)=>{
      if(!dragging) return;
      onMove(e.clientX, e.clientY);
    });
    ['pointerup','pointercancel','pointerleave'].forEach(ev=>{
      dialWrap.addEventListener(ev, ()=>{ dragging = false; });
    });
  }

  /* ---------------- render ---------------- */
  function setValue(key, val, fromDrag){
    const max = gaugeRefs[key].max;
    val = clamp(val, 0, max);
    if(state[activeId][key] === val) { if(!fromDrag) return; }
    state[activeId][key] = val;
    saveState();
    renderGauge(key);
    if(key === 'hp') renderRoster();
  }

  function renderGauge(key){
    const g = gaugeRefs[key];
    const val = state[activeId][key];
    const max = g.max;
    const angle = valueToAngle(val, max);

    // hp -> red, def -> blue, mp -> purple (fixed regardless of character)
    const colorVar = key === 'hp' ? 'var(--danger)' : (key === 'def' ? 'var(--def-blue)' : 'var(--mp-purple)');
    g.wrap.style.setProperty('--g-color', colorVar);

    // progress arc
    if(val <= 0){
      g.progress.setAttribute('d','');
    }else{
      g.progress.setAttribute('d', arcPath(CX,CY,R,START_ANGLE,angle));
    }

    // knob position
    const p = polar(CX,CY,R,angle);
    g.knob.setAttribute('transform', `translate(${p.x.toFixed(2)},${p.y.toFixed(2)})`);
    g.knob.setAttribute('aria-valuenow', val);

    // ticks
    g.ticks.forEach(t=>{
      const step = parseInt(t.dataset.step,10);
      t.classList.toggle('filled', step <= val);
    });

    // center label
    g.valueEl.textContent = val;
    g.centerEl.classList.toggle('dial-zero', val === 0 && key === 'hp');

    // stepper disabled state
    const wrap = g.wrap;
    wrap.querySelector('[data-dir="-1"]').disabled = val <= 0;
    wrap.querySelector('[data-dir="1"]').disabled = val >= max;
  }

  function currentAccentVar(){
    const c = CHARACTERS.find(c=>c.id===activeId);
    return c.color;
  }

  function renderAllGauges(){
    STATS.forEach(s=>renderGauge(s.key));
  }

  function renderRoster(){
    [...rosterEl.children].forEach(chip=>{
      const id = parseInt(chip.dataset.id,10);
      chip.dataset.active = (id === activeId) ? 'true' : 'false';
      chip.dataset.hpZero = (state[id].hp === 0) ? 'true' : 'false';
    });
  }

  function renderHeader(){
    const c = CHARACTERS.find(c=>c.id===activeId);
    document.getElementById('charName').textContent = c.name;
    document.getElementById('charElem').innerHTML = `<span class="dot"></span>${c.elem}`;
    document.documentElement.style.setProperty('--accent', `var(${c.color})`);
    document.documentElement.style.setProperty('--accent-glow', `var(${c.glow})`);
  }

  const bgPhotos = [...document.querySelectorAll('.bg-photo')];
  function renderBackground(){
    bgPhotos.forEach(el=>{
      el.classList.toggle('active', parseInt(el.dataset.char,10) === activeId);
    });
  }

  function selectCharacter(id){
    activeId = id;
    renderHeader();
    renderAllGauges();
    renderRoster();
    renderBackground();
  }

  document.getElementById('resetBtn').addEventListener('click', ()=>{
    if(!confirm('모든 캐릭터의 수치를 초기값(체력5 · 방어0 · 마나3)으로 되돌릴까요?')) return;
    state = defaultState();
    saveState();
    renderHeader();
    renderAllGauges();
    renderRoster();
  });

  document.getElementById('rotateClose').addEventListener('click', (e)=>{
    e.target.closest('.rotate-hint').style.display = 'none';
  });

  /* ---------------- init ---------------- */
  renderHeader();
  renderAllGauges();
  renderRoster();
  renderBackground();

})();
</script>
</body>
</html>
